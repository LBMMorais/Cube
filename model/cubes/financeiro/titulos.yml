cubes:
  - name: titulos
    sql_table: dbo.tb_titulo
    description: Títulos financeiros (contas a pagar e receber)
    
    public: false
    
    joins:
      - name: tipos_titulo
        sql: "{CUBE}.cod_tipo_titulo = {tipos_titulo.cod_tipo_titulo}"
        relationship: many_to_one
      
      - name: pessoas
        sql: "{CUBE}.cod_pessoa_titulo = {pessoas.cod_pessoa}"
        relationship: many_to_one

      - name: pessoas_filial
        sql: "{CUBE}.cod_pessoa_filial_titulo = {pessoas_filial.cod_pessoa}"
        relationship: many_to_one
    
    dimensions:
      - name: cod_titulo
        sql: cod_titulo
        type: number
        primary_key: true
        description: Código do título
        
      - name: cod_pessoa_empresa
        sql: cod_pessoa_empresa
        type: number
        description: Código da empresa
        
      - name: cod_pessoa_titulo
        sql: cod_pessoa_titulo
        type: number
        description: Código da pessoa do título
        
      - name: cod_pessoa_filial_titulo
        sql: cod_pessoa_filial_titulo
        type: number
        description: Código da filial
        
      - name: cod_pessoa_favorecido
        sql: cod_pessoa_favorecido
        type: number
        description: Código do favorecido
        
      - name: num_titulo
        sql: num_titulo
        type: string
        description: Número do título
        
      - name: seq_titulo
        sql: seq_titulo
        type: string
        description: Sequência do título
        
      # Dimensões de Data
      - name: dta_emissao_titulo
        sql: dta_emissao_titulo
        type: time
        description: Data de emissão do título
        
      - name: dta_vcto_titulo
        sql: dta_vcto_titulo
        type: time
        description: Data de vencimento do título
        
      - name: dta_movto_titulo
        sql: dta_movto_titulo
        type: time
        description: Data de movimentação do título

      - name: cod_tipo_titulo
        sql: cod_tipo_titulo
        type: number
        description: Código do tipo de título
        
      - name: ind_natureza_titulo
        sql: ind_natureza_titulo
        type: number
        description: Indicador da natureza do título (1=Receber, 2=Pagar)
        
      - name: natureza_titulo
        sql: |
          CASE 
            WHEN {CUBE}.ind_natureza_titulo = 1 THEN 'Contas a Receber'
            WHEN {CUBE}.ind_natureza_titulo = 2 THEN 'Contas a Pagar'
            ELSE 'Não Especificado'
          END
        type: string
        description: Natureza do título (Contas a Receber ou Pagar)
        
      - name: ind_status_titulo
        sql: ind_status_titulo
        type: number
        description: Indicador do status do título (1=Aberto, 4=Baixado, 6=Cancelado)
        
      - name: status_titulo
        sql: |
          CASE 
            WHEN {CUBE}.ind_status_titulo = 1 THEN 'Aberto'
            WHEN {CUBE}.ind_status_titulo = 4 THEN 'Baixado'
            WHEN {CUBE}.ind_status_titulo = 6 THEN 'Cancelado'
            ELSE 'Não Especificado'
          END
        type: string
        description: Status do título (Aberto, Baixado ou Cancelado)
        
      - name: ind_baixa_cnab
        sql: ind_baixa_cnab
        type: number
        description: Indicador de baixa CNAB
        
      # Percentuais
      - name: per_acr_titulo
        sql: per_acr_titulo
        type: number
        description: Percentual de acréscimo do título
        
      - name: per_multa_titulo
        sql: per_multa_titulo
        type: number
        description: Percentual de multa do título
        
      - name: per_juro_titulo
        sql: per_juro_titulo
        type: number
        description: Percentual de juros do título
        
      - name: per_desc_titulo
        sql: per_desc_titulo
        type: number
        description: Percentual de desconto do título
        
    measures:
      - name: count
        type: count
        description: Quantidade total de títulos
        
      # Medidas de contagem por natureza
      - name: count_receber
        type: count
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 1"
        description: Quantidade de títulos a receber
        
      - name: count_pagar
        type: count
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 2"
        description: Quantidade de títulos a pagar
        
      # Medidas de contagem por status
      - name: count_abertos
        type: count
        filters:
          - sql: "{CUBE}.ind_status_titulo = 1"
        description: Quantidade de títulos em aberto
        
      - name: count_baixados
        type: count
        filters:
          - sql: "{CUBE}.ind_status_titulo = 4"
        description: Quantidade de títulos baixados
        
      - name: count_cancelados
        type: count
        filters:
          - sql: "{CUBE}.ind_status_titulo = 6"
        description: Quantidade de títulos cancelados
        
      # Medidas de contagem combinadas
      - name: count_receber_abertos
        type: count
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 1 AND {CUBE}.ind_status_titulo = 1"
        description: Quantidade de títulos a receber em aberto
        
      - name: count_pagar_abertos
        type: count
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 2 AND {CUBE}.ind_status_titulo = 1"
        description: Quantidade de títulos a pagar em aberto
        
      # Medidas de valores
      - name: valor_total
        sql: val_titulo
        type: sum
        description: Valor total dos títulos
        
      - name: saldo_total
        sql: val_saldo_titulo
        type: sum
        description: Saldo total dos títulos
        
      # Medidas de valores por natureza
      - name: valor_receber
        sql: val_titulo
        type: sum
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 1"
        description: Valor total a receber
        
      - name: valor_pagar
        sql: val_titulo
        type: sum
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 2"
        description: Valor total a pagar
        
      - name: saldo_receber
        sql: val_saldo_titulo
        type: sum
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 1"
        description: Saldo total a receber
        
      - name: saldo_pagar
        sql: val_saldo_titulo
        type: sum
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 2"
        description: Saldo total a pagar
        
      # Medidas de valores em aberto
      - name: valor_receber_aberto
        sql: val_saldo_titulo
        type: sum
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 1 AND {CUBE}.ind_status_titulo = 1"
        description: Valor a receber em aberto
        
      - name: valor_pagar_aberto
        sql: val_saldo_titulo
        type: sum
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 2 AND {CUBE}.ind_status_titulo = 1"
        description: Valor a pagar em aberto
        
      # Medidas estatísticas
      - name: valor_medio
        sql: val_titulo
        type: avg
        description: Valor médio dos títulos
        
      - name: valor_minimo
        sql: val_titulo
        type: min
        description: Valor mínimo dos títulos
        
      - name: valor_maximo
        sql: val_titulo
        type: max
        description: Valor máximo dos títulos
        
      - name: saldo_medio
        sql: val_saldo_titulo
        type: avg
        description: Saldo médio dos títulos
        
      # Medidas derivadas
      - name: percentual_quitacao
        type: number
        sql: |
          CASE 
            WHEN SUM({CUBE}.val_titulo) > 0 THEN 
              (SUM({CUBE}.val_titulo) - SUM({CUBE}.val_saldo_titulo)) / NULLIF(SUM({CUBE}.val_titulo), 0) * 100
            ELSE 0 
          END
        description: Percentual de quitação dos títulos (% pago do total)
        
      - name: valor_pago
        type: number
        sql: "SUM({CUBE}.val_titulo - {CUBE}.val_saldo_titulo)"
        description: Valor efetivamente pago (valor total - saldo)
        
      - name: saldo_liquido
        type: number
        sql: "SUM(CASE WHEN {CUBE}.ind_natureza_titulo = 1 THEN {CUBE}.val_saldo_titulo ELSE -{CUBE}.val_saldo_titulo END)"
        description: Saldo líquido (receber - pagar)
