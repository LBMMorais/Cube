cubes:
  - name: titulos
    sql_table: dbo.tb_titulo
    description: Títulos financeiros (contas a pagar e receber)
    
    public: false
    
    joins:
      - name: tipos_titulo
        sql: "{CUBE}.cod_tipo_titulo = {tipos_titulo.cod_tipo_titulo}"
        relationship: many_to_one
      
      - name: pessoas
        sql: "{CUBE}.cod_pessoa_titulo = {pessoas.cod_pessoa}"
        relationship: many_to_one
    
    dimensions:
      - name: cod_titulo
        sql: cod_titulo
        type: number
        primary_key: true
        description: Código do título
        
      - name: cod_pessoa_empresa
        sql: cod_pessoa_empresa
        type: number
        description: Código da empresa
        
      - name: cod_pessoa_titulo
        sql: cod_pessoa_titulo
        type: number
        description: Código da pessoa do título
        
      - name: cod_pessoa_filial_titulo
        sql: cod_pessoa_filial_titulo
        type: number
        description: Código da filial
        
      - name: cod_pessoa_favorecido
        sql: cod_pessoa_favorecido
        type: number
        description: Código do favorecido
        
      - name: num_titulo
        sql: num_titulo
        type: string
        description: Número do título
        
      - name: cod_boleto
        sql: cod_boleto
        type: number
        description: Código do boleto
        
      - name: seq_titulo
        sql: seq_titulo
        type: string
        description: Sequência do título
        
      # Dimensões de Data
      - name: dta_emissao_titulo
        sql: dta_emissao_titulo
        type: time
        description: Data de emissão do título
        
      - name: dta_vcto_titulo
        sql: dta_vcto_titulo
        type: time
        description: Data de vencimento do título
        
      - name: dta_movto_titulo
        sql: dta_movto_titulo
        type: time
        description: Data de movimentação do título
        
      - name: dta_ini_correcao
        sql: dta_ini_correcao
        type: time
        description: Data início da correção
        
      - name: dta_ini_juro
        sql: dta_ini_juro
        type: time
        description: Data início dos juros
        
      - name: dta_desc_titulo
        sql: dta_desc_titulo
        type: time
        description: Data de desconto do título
        
      - name: dta_venc_fluxo
        sql: dta_venc_fluxo
        type: time
        description: Data de vencimento para fluxo de caixa
        
      # Códigos de referência
      - name: cod_indexador
        sql: cod_indexador
        type: number
        description: Código do indexador
        
      - name: cod_local_movto
        sql: cod_local_movto
        type: number
        description: Código do local de movimentação
        
      - name: cod_pessoa_banco
        sql: cod_pessoa_banco
        type: number
        description: Código do banco
        
      - name: cod_tipo_titulo
        sql: cod_tipo_titulo
        type: number
        description: Código do tipo de título
        
      - name: cod_centro_cr
        sql: cod_centro_cr
        type: number
        description: Código do centro de custo/receita
        
      - name: cod_classe_ctb
        sql: cod_classe_ctb
        type: number
        description: Código da classe contábil
        
      - name: cod_pedido
        sql: cod_pedido
        type: number
        description: Código do pedido
        
      - name: cod_registro_pai
        sql: cod_registro_pai
        type: number
        description: Código do registro pai
        
      # Indicadores numéricos
      - name: ind_registro_pai
        sql: ind_registro_pai
        type: number
        description: Indicador do tipo de registro pai
        
      - name: ind_natureza_titulo
        sql: ind_natureza_titulo
        type: number
        description: Indicador da natureza do título (1=Receber, 2=Pagar)
        
      - name: natureza_titulo
        sql: |
          CASE 
            WHEN {CUBE}.ind_natureza_titulo = 1 THEN 'Contas a Receber'
            WHEN {CUBE}.ind_natureza_titulo = 2 THEN 'Contas a Pagar'
            ELSE 'Não Especificado'
          END
        type: string
        description: Natureza do título (Contas a Receber ou Pagar)
        
      - name: ind_status_titulo
        sql: ind_status_titulo
        type: number
        description: Indicador do status do título (1=Aberto, 4=Baixado, 6=Cancelado)
        
      - name: status_titulo
        sql: |
          CASE 
            WHEN {CUBE}.ind_status_titulo = 1 THEN 'Aberto'
            WHEN {CUBE}.ind_status_titulo = 4 THEN 'Baixado'
            WHEN {CUBE}.ind_status_titulo = 6 THEN 'Cancelado'
            ELSE 'Não Especificado'
          END
        type: string
        description: Status do título (Aberto, Baixado ou Cancelado)
        
      - name: ind_status_conta
        sql: ind_status_conta
        type: number
        description: Indicador do status da conta
        
      - name: ind_titulo_impresso
        sql: ind_titulo_impresso
        type: number
        description: Indicador se título foi impresso
        
      - name: ind_baixa_cnab
        sql: ind_baixa_cnab
        type: number
        description: Indicador de baixa CNAB
        
      # Indicadores booleanos
      - name: ind_descontado
        sql: ind_descontado
        type: boolean
        description: Indica se título foi descontado
        
      - name: ind_nf_compl
        sql: ind_nf_compl
        type: boolean
        description: Indica se é nota fiscal complementar
        
      - name: ind_fluxo_caixa
        sql: ind_fluxo_caixa
        type: boolean
        description: Indica se entra no fluxo de caixa
        
      - name: ind_cartao
        sql: ind_cartao
        type: boolean
        description: Indica se é pagamento com cartão
        
      # Percentuais
      - name: per_acr_titulo
        sql: per_acr_titulo
        type: number
        description: Percentual de acréscimo do título
        
      - name: per_multa_titulo
        sql: per_multa_titulo
        type: number
        description: Percentual de multa do título
        
      - name: per_juro_titulo
        sql: per_juro_titulo
        type: number
        description: Percentual de juros do título
        
      - name: per_desc_titulo
        sql: per_desc_titulo
        type: number
        description: Percentual de desconto do título
        
      # Quantidades
      - name: qtd_quilo
        sql: qtd_quilo
        type: number
        description: Quantidade em quilos
        
      - name: qtd_baixa_quilo
        sql: qtd_baixa_quilo
        type: number
        description: Quantidade baixada em quilos
        
      - name: qtd_vol
        sql: qtd_vol
        type: number
        description: Quantidade em volume
        
      - name: qtd_saldo_vol
        sql: qtd_saldo_vol
        type: number
        description: Saldo de volume
        
      - name: num_dias_float
        sql: num_dias_float
        type: number
        description: Número de dias de float
        
      # Campos de texto
      - name: des_nosso_numero
        sql: des_nosso_numero
        type: string
        description: Nosso número do banco
        
      - name: des_seu_numero
        sql: des_seu_numero
        type: string
        description: Seu número
        
      - name: des_codigo_barra
        sql: des_codigo_barra
        type: string
        description: Código de barras
        
      - name: des_codigo_barra_grafico
        sql: des_codigo_barra_grafico
        type: string
        description: Código de barras gráfico
        
      - name: id_host
        sql: id_host
        type: string
        
      - name: id_row
        sql: id_row
        type: string
    
    measures:
      - name: count
        type: count
        description: Quantidade total de títulos
        
      # Medidas de contagem por natureza
      - name: count_receber
        type: count
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 1"
        description: Quantidade de títulos a receber
        
      - name: count_pagar
        type: count
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 2"
        description: Quantidade de títulos a pagar
        
      # Medidas de contagem por status
      - name: count_abertos
        type: count
        filters:
          - sql: "{CUBE}.ind_status_titulo = 1"
        description: Quantidade de títulos em aberto
        
      - name: count_baixados
        type: count
        filters:
          - sql: "{CUBE}.ind_status_titulo = 4"
        description: Quantidade de títulos baixados
        
      - name: count_cancelados
        type: count
        filters:
          - sql: "{CUBE}.ind_status_titulo = 6"
        description: Quantidade de títulos cancelados
        
      # Medidas de contagem combinadas
      - name: count_receber_abertos
        type: count
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 1 AND {CUBE}.ind_status_titulo = 1"
        description: Quantidade de títulos a receber em aberto
        
      - name: count_pagar_abertos
        type: count
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 2 AND {CUBE}.ind_status_titulo = 1"
        description: Quantidade de títulos a pagar em aberto
        
      # Medidas de valores
      - name: valor_total
        sql: val_titulo
        type: sum
        description: Valor total dos títulos
        
      - name: saldo_total
        sql: val_saldo_titulo
        type: sum
        description: Saldo total dos títulos
        
      - name: valor_antecipacao
        sql: val_parcela_antec_tit
        type: sum
        description: Valor total de antecipações
        
      # Medidas de valores por natureza
      - name: valor_receber
        sql: val_titulo
        type: sum
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 1"
        description: Valor total a receber
        
      - name: valor_pagar
        sql: val_titulo
        type: sum
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 2"
        description: Valor total a pagar
        
      - name: saldo_receber
        sql: val_saldo_titulo
        type: sum
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 1"
        description: Saldo total a receber
        
      - name: saldo_pagar
        sql: val_saldo_titulo
        type: sum
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 2"
        description: Saldo total a pagar
        
      # Medidas de valores em aberto
      - name: valor_receber_aberto
        sql: val_saldo_titulo
        type: sum
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 1 AND {CUBE}.ind_status_titulo = 1"
        description: Valor a receber em aberto
        
      - name: valor_pagar_aberto
        sql: val_saldo_titulo
        type: sum
        filters:
          - sql: "{CUBE}.ind_natureza_titulo = 2 AND {CUBE}.ind_status_titulo = 1"
        description: Valor a pagar em aberto
        
      # Medidas estatísticas
      - name: valor_medio
        sql: val_titulo
        type: avg
        description: Valor médio dos títulos
        
      - name: valor_minimo
        sql: val_titulo
        type: min
        description: Valor mínimo dos títulos
        
      - name: valor_maximo
        sql: val_titulo
        type: max
        description: Valor máximo dos títulos
        
      - name: saldo_medio
        sql: val_saldo_titulo
        type: avg
        description: Saldo médio dos títulos
        
      # Medidas de quantidades
      - name: total_quilos
        sql: qtd_quilo
        type: sum
        description: Total de quilos
        
      - name: total_quilos_baixados
        sql: qtd_baixa_quilo
        type: sum
        description: Total de quilos baixados
        
      - name: total_volume
        sql: qtd_vol
        type: sum
        description: Total de volume
        
      - name: saldo_volume
        sql: qtd_saldo_vol
        type: sum
        description: Saldo total de volume
        
      # Medidas derivadas
      - name: percentual_quitacao
        type: number
        sql: |
          CASE 
            WHEN SUM({CUBE}.val_titulo) > 0 THEN 
              (SUM({CUBE}.val_titulo) - SUM({CUBE}.val_saldo_titulo)) / NULLIF(SUM({CUBE}.val_titulo), 0) * 100
            ELSE 0 
          END
        description: Percentual de quitação dos títulos (% pago do total)
        
      - name: valor_pago
        type: number
        sql: "SUM({CUBE}.val_titulo - {CUBE}.val_saldo_titulo)"
        description: Valor efetivamente pago (valor total - saldo)
        
      - name: saldo_liquido
        type: number
        sql: "SUM(CASE WHEN {CUBE}.ind_natureza_titulo = 1 THEN {CUBE}.val_saldo_titulo ELSE -{CUBE}.val_saldo_titulo END)"
        description: Saldo líquido (receber - pagar)
