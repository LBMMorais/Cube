views:
  - name: titulos_view
    description: Análise de títulos financeiros (contas a pagar e receber)
    
    cubes:
      - join_path: titulos
        includes:
          # Dimensões principais
          - cod_titulo
          - num_titulo
          - seq_titulo
          - cod_boleto
          
          # Dimensões de pessoas
          - cod_pessoa_empresa
          - cod_pessoa_titulo
          - cod_pessoa_filial_titulo
          - cod_pessoa_favorecido
          
          # Dimensões de datas
          - dta_emissao_titulo
          - dta_vcto_titulo
          - dta_movto_titulo
          - dta_venc_fluxo
          - dta_ini_correcao
          - dta_ini_juro
          - dta_desc_titulo
          
          # Dimensões calculadas
          - natureza_titulo
          - status_titulo
          
          # Dimensões de códigos de referência
          - cod_tipo_titulo
          - cod_indexador
          - cod_local_movto
          - cod_pessoa_banco
          - cod_centro_cr
          - cod_tran_finan
          - cod_classe_ctb
          - cod_pedido
          - cod_registro_pai
          - ind_registro_pai
          
          # Indicadores numéricos
          - ind_natureza_titulo
          - ind_status_titulo
          - ind_status_conta
          - ind_titulo_impresso
          - ind_baixa_cnab
          
          # Indicadores booleanos
          - ind_descontado
          - ind_nf_compl
          - ind_fluxo_caixa
          - ind_cartao
          
          # Percentuais
          - per_acr_titulo
          - per_multa_titulo
          - per_juro_titulo
          - per_desc_titulo
          
          # Quantidades
          - qtd_quilo
          - qtd_baixa_quilo
          - qtd_vol
          - qtd_saldo_vol
          - num_dias_float
          
          # Campos de texto
          - des_nosso_numero
          - des_seu_numero
          - des_codigo_barra
          - des_codigo_barra_grafico
          
          # Medidas - Contagens
          - count
          - count_receber
          - count_pagar
          - count_abertos
          - count_baixados
          - count_cancelados
          - count_receber_abertos
          - count_pagar_abertos
          
          # Medidas - Valores
          - valor_total
          - saldo_total
          - valor_antecipacao
          - valor_receber
          - valor_pagar
          - saldo_receber
          - saldo_pagar
          - valor_receber_aberto
          - valor_pagar_aberto
          
          # Medidas - Estatísticas
          - valor_medio
          - valor_minimo
          - valor_maximo
          - saldo_medio
          
          # Medidas - Quantidades
          - total_quilos
          - total_quilos_baixados
          - total_volume
          - saldo_volume
          
          # Medidas - Derivadas
          - percentual_quitacao
          - valor_pago
          - saldo_liquido
      
      - join_path: titulos.tipos_titulo
        prefix: true
        includes:
          - des_tipo_titulo
      
      - join_path: titulos.pessoas
        includes:
          - name: nom_pessoa
            alias: nome_pessoa_titulo
