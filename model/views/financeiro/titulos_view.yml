views:
  - name: titulos_view
    title: Títulos Financeiros
    description: Análise de títulos financeiros (contas a pagar e receber)
    
    cubes:
      - join_path: titulos
        includes:
          # Dimensões principais
          - name: cod_titulo
            title: Código do Título
          - name: num_titulo
            title: Número do Título
          - name: seq_titulo
            title: Sequência do Título
          
          # Dimensões de datas
          - name: dta_emissao_titulo
            title: Data de Emissão
          - name: dta_vcto_titulo
            title: Data de Vencimento
          - name: dta_movto_titulo
            title: Data de Movimento

          # Dimensões calculadas
          - name: natureza_titulo
            title: Natureza
          - name: status_titulo
            title: Status
          
          # Indicadores numéricos
          - name: ind_natureza_titulo
            title: Indicador de Natureza
          - name: ind_status_titulo
            title: Indicador de Status
          - name: ind_baixa_cnab
            title: Indicador Baixa CNAB
          
          # Percentuais
          - name: per_acr_titulo
            title: Percentual de Acréscimo
          - name: per_multa_titulo
            title: Percentual de Multa
          - name: per_juro_titulo
            title: Percentual de Juros
          - name: per_desc_titulo
            title: Percentual de Desconto
          
          # Medidas - Contagens
          - name: count
            title: Quantidade de Títulos
          - name: count_receber
            title: Qtd. a Receber
          - name: count_pagar
            title: Qtd. a Pagar
          - name: count_abertos
            title: Qtd. Abertos
          - name: count_baixados
            title: Qtd. Baixados
          - name: count_cancelados
            title: Qtd. Cancelados
          - name: count_receber_abertos
            title: Qtd. a Receber Abertos
          - name: count_pagar_abertos
            title: Qtd. a Pagar Abertos
          
          # Medidas - Valores
          - name: valor_total
            title: Valor Total
          - name: saldo_total
            title: Saldo Total
          - name: valor_receber
            title: Valor a Receber
          - name: valor_pagar
            title: Valor a Pagar
          - name: saldo_receber
            title: Saldo a Receber
          - name: saldo_pagar
            title: Saldo a Pagar
          - name: valor_receber_aberto
            title: Valor a Receber (Aberto)
          - name: valor_pagar_aberto
            title: Valor a Pagar (Aberto)
          
          # Medidas - Estatísticas
          - name: valor_medio
            title: Valor Médio
          - name: valor_minimo
            title: Valor Mínimo
          - name: valor_maximo
            title: Valor Máximo
          - name: saldo_medio
            title: Saldo Médio
          
          # Medidas - Derivadas
          - name: percentual_quitacao
            title: Percentual de Quitação
          - name: valor_pago
            title: Valor Pago
          - name: saldo_liquido
            title: Saldo Líquido
      
      - join_path: titulos.tipos_titulo
        prefix: true
        includes:
          - name: des_tipo_titulo
            title: Tipo Titulo
      
      - join_path: titulos.pessoas
        includes:
          - name: nom_pessoa
            alias: nome_pessoa_titulo
            title: Nome Pessoa

          - name: count_pessoas_fisicas
            title: Qtd. Pessoas Físicas

          - name: count_pessoas_juridicas
            title: Qtd. Pessoas Jurídicas

      - join_path: titulos.pessoas_filial
        includes:
          - name: nom_reduzido_pessoa
            alias: nome_reduzido_filial
            title: Filial

          - name: nom_pessoa
            alias: nome_filial
            title: Nome Filial
