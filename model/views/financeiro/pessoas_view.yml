views:
  - name: pessoas_view
    title: Cadastro de Pessoas
    description: Visão completa de pessoas e empresas
    
    cubes:
      - join_path: pessoas
        includes:
          - name: cod_pessoa
            title: Código da Pessoa
          - name: nom_pessoa
            title: Nome da Pessoa
          - name: nom_reduzido_pessoa
            title: Nome Reduzido
          - name: dta_cadastramento
            title: Data de Cadastramento
          - name: tipo_pessoa
            title: Tipo de Pessoa
          - name: status_pessoa
            title: Status
          - name: ind_pessoa_empresa
            title: Indicador Pessoa/Empresa
          - name: ind_forn_homolog
            title: Indicador Fornecedor Homologado
          - name: count
            title: Quantidade de Pessoas
          - name: count_pessoas_fisicas
            title: Qtd. Pessoas Físicas
          - name: count_pessoas_juridicas
            title: Qtd. Pessoas Jurídicas
          - name: count_ativos
            title: Qtd. Ativos
          - name: count_inativos
            title: Qtd. Inativos
          - name: count_filiais
            title: Qtd. Filiais
          - name: count_fornecedores_homologados
            title: Qtd. Fornecedores Homologados

      - join_path: pessoas.pessoas_fisica
        prefix: true
        includes:
          - name: num_cpf
            title: CPF
          - name: sexo
            title: Sexo
          - name: dta_nascimento
            title: Data de Nascimento
          - name: num_doc_identidade
            title: RG
          - name: num_insc_pis
            title: Inscrição PIS
          - name: nom_contato
            title: Contato (PF)

      - join_path: pessoas.pessoas_juridica
        prefix: true
        includes:
          - name: num_cgc
            title: CNPJ
          - name: num_insc_estadual
            title: Inscrição Estadual
          - name: num_insc_municipal
            title: Inscrição Municipal
          - name: dta_fundacao
            title: Data de Fundação
          - name: nom_contato
            title: Contato (PJ)
